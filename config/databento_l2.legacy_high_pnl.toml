[databento]
dataset = "XNAS.ITCH"
schema = "mbp-10"
symbols = ["SOUN", "RKLB", "RIVN"]
start = "2026-05-28T13:30:00"
end = "2026-05-28T20:00:00"
stype_in = "raw_symbol"

raw_dir = "data/databento/raw"
processed_dir = "data/databento/processed"
feature_path = "data/features/l2_features.csv"
resample_interval = "1min"
max_rows = 50000000

[l2_setups]
max_spread_bps = 100.0
min_depth_10 = 100
min_imbalance_10 = 0.10

min_total_depth_10 = 500
min_trade_count = 10
min_trade_volume = 1000
microprice_tolerance_bps = 2.0
spread_compression_lookback = 5

allow_imbalance_setup = true
allow_spread_compression_setup = false
allow_pullback_reclaim_setup = false

[simulation]
session_focus = "opening_ladder"

warmup_start_et = "09:30"
warmup_end_et = "10:30"

holding_period_bars = 5
estimated_cost_bps = 5.0

max_warmup_trades_per_symbol = 1
max_warmup_notional = 300

max_ladder_probes_per_symbol = 3
ladder_probe_notional = 50
max_ladder_single_probe_notional = 50
max_ladder_total_notional_per_symbol = 150
allow_one_share_high_price_probe = false
ladder_cooldown_minutes = 5

use_ranked_symbol_selection = false
max_active_symbols_per_open = 999
minimum_opening_score = -999999

blotter_path = "data/reports/l2_trade_blotter.csv"
summary_path = "data/reports/l2_performance_summary.csv"

opening_warmup_blotter_path = "data/reports/l2_opening_warmup_blotter.csv"
opening_warmup_summary_path = "data/reports/l2_opening_warmup_summary.csv"
opening_diagnostics_path = "data/reports/l2_opening_diagnostics.csv"
opening_vs_allday_comparison_path = "data/reports/l2_opening_vs_allday_comparison.csv"

opening_ladder_blotter_path = "data/reports/l2_opening_ladder_blotter.csv"
opening_ladder_summary_path = "data/reports/l2_opening_ladder_summary.csv"
opening_strategy_comparison_path = "data/reports/l2_opening_strategy_comparison.csv"
opening_ladder_family_summary_path = "data/reports/l2_opening_ladder_family_summary.csv"
