# Demo watchlist config for paper-only meme / retail-hype research.
# Copy to config/trading_plan.toml only after you review every symbol.

[meta]
name = "meme-microexec-paper-plan"
timezone = "America/New_York"

[ibkr]
host = "127.0.0.1"
paper_port = 7497
live_port = 7496
client_id = 2198
account = ""
readonly_market_data = false

[runtime]
environment = "paper"
live_enabled = false
kill_switch_file = ".kill_switch"
log_dir = "logs"

[budget]
max_gross_notional = 3000.00
max_single_order_notional = 125.00
max_daily_trades = 6
min_cash_reserve = 300.00
allow_short = false

[orders]
order_type = "LMT"
time_in_force = "DAY"
outside_regular_trading_hours = false
require_quote = true
send_by_default = false

[[windows]]
name = "morning_after_open"
timezone = "America/New_York"
start = "09:45"
end = "10:30"
days = ["Mon", "Tue", "Wed", "Thu", "Fri"]

[[windows]]
name = "late_day_reviewed"
timezone = "America/New_York"
start = "15:15"
end = "15:50"
days = ["Mon", "Tue", "Wed", "Thu", "Fri"]


[[windows]]
name = "09:45-10:30"
timezone = "America/New_York"
start = "09:45"
end = "10:30"
days = ["Mon", "Tue", "Wed", "Thu", "Fri"]

[[windows]]
name = "10:00-11:15"
timezone = "America/New_York"
start = "10:00"
